resources:
  jobs:
    formula1_full_pipeline:

      name: Formula1 Bronze Load

      tasks:

        - task_key: 01.Circuit_file
          notebook_task:
            notebook_path: ../notebooks/bronze/01.Circuit_file.py

        - task_key: 02.Races_file
          notebook_task:
            notebook_path: ../notebooks/bronze/02.Races_file.py

        - task_key: 03.Constructors_file
          notebook_task:
            notebook_path: ../notebooks/bronze/03.Constructors_file.py

        - task_key: 04.Drivers_file
          notebook_task:
            notebook_path: ../notebooks/bronze/04.Drivers_file.py

        - task_key: 05.Results_file
          notebook_task:
            notebook_path: ../notebooks/bronze/05.Results_file.py

        - task_key: 06.Sprints_file
          notebook_task:
            notebook_path: ../notebooks/bronze/06.Sprints_file.py

       # silver notebooks

        - task_key: 01.Transform_circuits
          depends_on:
            - task_key: 01.Circuit_file
          notebook_task:
            notebook_path: ../notebooks/silver/01.Transform_circuits.py

        - task_key: 02.Transform_races
          depends_on:
            - task_key: 02.Races_file
          notebook_task:
            notebook_path: ../notebooks/silver/02.Transform_races.py

        - task_key: 03.Transform_constructors
          depends_on:
            - task_key: 03.Constructors_file
          notebook_task:
            notebook_path: ../notebooks/silver/03.Transform_constructors.py

        - task_key: 04.Transform_drivers
          depends_on:
            - task_key: 04.Drivers_file
          notebook_task:
            notebook_path: ../notebooks/silver/04.Transform_drivers.py

        - task_key: 05.Transform_results
          depends_on:
            - task_key: 05.Results_file
          notebook_task:
            notebook_path: ../notebooks/silver/05.Transform_results.py

        - task_key: 06.Transform_sprints
          depends_on:
            - task_key: 06.Sprints_file
          notebook_task:
            notebook_path: ../notebooks/silver/06.Transform_sprints.py
        
        - task_key: Ref_nationality
          notebook_task:
            notebook_path: ../notebooks/gold/Ref_nationality.py

       # gold notebooks

        - task_key: 01.dimRaces
          depends_on:
            - task_key: 01.Transform_circuits
            - task_key: 02.Transform_races
          notebook_task:
            notebook_path: ../notebooks/gold/01.dimRaces.py

        - task_key: 02.dimConstructors
          depends_on:
            - task_key: 03.Constructors_file
            - task_key: Ref_nationality
          notebook_task:
            notebook_path: ../notebooks/gold/02.dimConstructors.py

        - task_key: 03.dimDrivers
          depends_on:
            - task_key: 04.Transform_drivers
            - task_key: Ref_nationality
          notebook_task:
            notebook_path: ../notebooks/gold/03.dimDrivers.py

        - task_key: 04.factResults
          depends_on:
            - task_key: 05.Transform_results
            - task_key: 06.Transform_sprints
          notebook_task:
            notebook_path: ../notebooks/gold/04.factResults.py
